{% extends "base.html" %}
{% block title %}Connexion{% endblock %}

{% block content %}
<section class="auth-box" aria-labelledby="titre-login">
  <h1 id="titre-login">Connexion</h1>
  <form method="post" class="auth-form">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" autocomplete="current-password" style="width: 100%;" required>
        <button type="button" class="password-toggle" onclick="togglePassword('password')">👁️</button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
  </form>
  <p class="auth-switch">
    Pas encore de compte ? <a href="{{ url_for('auth.register') }}">Créer un compte</a>
  </p>
</section>

<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
{% endblock %}
