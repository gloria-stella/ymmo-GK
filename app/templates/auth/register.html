{% extends "base.html" %}
{% block title %}Inscription{% endblock %}

{% block content %}
<section class="auth-box" aria-labelledby="titre-register">
  <h1 id="titre-register">Créer un compte</h1>
  <form method="post" class="auth-form">
    <div class="form-row">
      <div class="field">
        <label for="first_name">Prénom</label>
        <input type="text" id="first_name" name="first_name" autocomplete="given-name" required>
      </div>
      <div class="field">
        <label for="last_name">Nom</label>
        <input type="text" id="last_name" name="last_name" autocomplete="family-name" required>
      </div>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" autocomplete="new-password" style="width: 100%;" required>
        <button type="button" class="password-toggle" onclick="togglePassword('password')">👁️</button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
  </form>
  <p class="auth-switch">
    Déjà inscrit ? <a href="{{ url_for('auth.login') }}">Se connecter</a>
  </p>
</section>

<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
{% endblock %}
